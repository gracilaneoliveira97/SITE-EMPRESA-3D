<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Empresa de Impressão 3D</title>

<style>

body{
font-family: Arial, sans-serif;
margin:0;
background:#f4f4f4;
overflow-x:hidden;
}

header{
position:absolute;
top:0;
left:0;
width:100%;
padding:15px 20px;
display:flex;
justify-content:space-between;
align-items:center;
z-index:10;
box-sizing:border-box;
}

.logo{
font-size:20px;
font-weight:bold;
}

.menu{
font-size:30px;
cursor:pointer;
color:white;
}

.opcoes{
position:fixed;
top:0;
right:-250px;
width:250px;
height:100%;
background:#222;
color:white;
transition:0.3s;
z-index:20;
padding-top:60px;
}

.opcoes div{
padding:20px;
border-bottom:1px solid #444;
cursor:pointer;
font-size:18px;
}

.opcoes div:hover{
background:#333;
}

.secao{
max-height:0;
overflow:hidden;
transition:max-height 0.5s ease;
padding:0 30px;
background:white;
margin:0 20px;
border-radius:8px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

.secao.ativa{
max-height:500px;
padding:30px;
margin:20px;
}
  /*bANNER INICIAL*/
  .banner{
width:100%;
height:350px;
background-image:url("https://via.placeholder.com/1200x350");
background-size:cover;
background-position:center;
position:relative;
}

.pontos{
position:absolute;
bottom:15px;
width:100%;
text-align:center;
}

.pontos span{
display:inline-block;
width:10px;
height:10px;
background:white;
border-radius:50%;
margin:5px;
opacity:0.7;
}
  
  .whatsapp{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
color:white;
font-size:28px;
width:60px;
height:60px;
display:flex;
align-items:center;
justify-content:center;
border-radius:50%;
text-decoration:none;
box-shadow:0 4px 10px rgba(0,0,0,0.3);
}
 
  .logo img {
   height:35px;
}

</style>

</head>

<body>

<header>

<div class="logo">
 <img src="logo.png" alt="Logo da Empresa">
</div>

<div class="menu" onclick="abrirMenu()">☰</div>

</header>

  <div class="banner">
  <div class="pontos">
  <span></span>
  <span></span>
  <span></span>
  </div>

  </div>
  <!--FIM DO BANER-->
  
  <div id="menuOpcoes" class="opcoes">

<div onclick="toggle('sobre')">Sobre</div>
<div onclick="toggle('portfolio')">Portfólio</div>
<div onclick="toggle('manutencao')">Manutenção</div>
<div onclick="toggle('contato')">Contato</div>

</div>

<div id="sobre" class="secao">
<h2>Sobre a empresa</h2>
<p>Aqui vai a história da empresa e o que ela faz com impressão 3D.</p>
</div>

<div id="portfolio" class="secao">
<h2>Portfólio</h2>
<p>Aqui você pode colocar fotos dos trabalhos feitos.</p>
</div>

<div id="manutencao" class="secao">
<h2>Manutenção</h2>
<p>Informações sobre manutenção de impressoras 3D.</p>
</div>

<div id="contato" class="secao">
<h2>Contato</h2>
<p>WhatsApp: coloque o número aqui</p>
</div>
<a href="https://wa.me/5511999999999" class="whatsapp" target="_blank">
💬
</a>
  
<script>

function abrirMenu(){

let menu = document.getElementById("menuOpcoes");

if(menu.style.right === "0px"){
menu.style.right = "-250px";
}else{
menu.style.right = "0px";
}

}

function toggle(secao){

let elemento = document.getElementById(secao);
let jaEstaAberta = elemento.classList.contains("ativa");

// fecha todas
let secoes = document.querySelectorAll(".secao");
secoes.forEach(function(s){
s.classList.remove("ativa");
});

// se não estava aberta, abre
if(!jaEstaAberta){
elemento.classList.add("ativa");
}

// fecha o menu lateral
let menu = document.getElementById("menuOpcoes");
menu.style.right = "-250px";
}
  
// impede que clique dentro do menu feche tudo
let menuOpcoes = document.getElementById("menuOpcoes");
menuOpcoes.addEventListener("click", function(event){
event.stopPropagation();
});
  
document.addEventListener("click", function(event){

let menu = document.getElementById("menuOpcoes");
let botao = document.querySelector(".menu");

if(!menu.contains(event.target) && !botao.contains(event.target)){
menu.style.right = "-250px";

let secoes = document.querySelectorAll(".secao");
secoes.forEach(function(s){
s.classList.remove("ativa");
});
}

});
  
</script>

</body>
</html>
