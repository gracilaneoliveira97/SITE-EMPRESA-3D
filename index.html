<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Empresa de Impressão 3D</title>

<style>

body{
font-family: Arial, sans-serif;
margin:0;
background:#f4f4f4;
overflow-x:hidden;
}

header{
position:absolute;
top:0;
left:0;
width:100%;
padding:15px 20px;
display:flex;
justify-content:space-between;
align-items:center;
z-index:10;
box-sizing:border-box;
}

.logo{
font-size:20px;
font-weight:bold;
}

.menu{
font-size:30px;
cursor:pointer;
color:white;
}

.opcoes{
position:fixed;
top:0;
right:-250px;
width:250px;
height:100%;
background:#222;
color:white;
transition:0.3s;
z-index:10;
padding-top:60px;
}

  /*bANNER INICIAL*/
  .banner{
width:100%;
height:350px;
background-image:url("https://via.placeholder.com/1200x350");
background-size:cover;
background-position:center;
position:relative;
}

.pontos{
position:absolute;
bottom:15px;
width:100%;
text-align:center;
}

.pontos span{
display:inline-block;
width:10px;
height:10px;
background:white;
border-radius:50%;
margin:5px;
opacity:0.7;
}
  
  .whatsapp{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
color:white;
font-size:28px;
width:60px;
height:60px;
display:flex;
align-items:center;
justify-content:center;
border-radius:50%;
text-decoration:none;
box-shadow:0 4px 10px rgba(0,0,0,0.3);
}
 
  .logo img {
   height:35px;
}
.item{
border-bottom:1px solid #444;
}

.titulo{
padding:20px;
cursor:pointer;
font-size:18px;
}

.conteudo{
max-height:0;
overflow:hidden;
transition:max-height 0.4s ease;
background:#333;
padding:0 20px;
font-size:15px;
}

.item.ativo .conteudo{
max-height:200px;
padding:15px 20px;
}
</style>

</head>

<body>

<header>

<div class="logo">
 <img src="logo.png" alt="Logo da Empresa">
</div>

<div class="menu" onclick="abrirMenu()">☰</div>

</header>

  <div class="banner">
  <div class="pontos">
  <span></span>
  <span></span>
  <span></span>
  </div>

  </div>
  <!--FIM DO BANER-->
  
 <div id="menuOpcoes" class="opcoes">

  <div class="item">
    <div class="titulo">Sobre</div>
    <div class="conteudo">
      <p>Aqui vai a história da empresa e o que ela faz com impressão 3D.</p>
    </div>
  </div>

  <div class="item">
    <div class="titulo">Portfólio</div>
    <div class="conteudo">
      <p>Aqui você pode colocar fotos dos trabalhos feitos.</p>
    </div>
  </div>

  <div class="item">
    <div class="titulo">Manutenção</div>
    <div class="conteudo">
      <p>Informações sobre manutenção de impressoras 3D.</p>
    </div>
  </div>

  <div class="item">
    <div class="titulo">Contato</div>
    <div class="conteudo">
      <p>WhatsApp: coloque o número aqui</p>
    </div>
  </div>

</div>

<a href="https://wa.me/5511999999999" class="whatsapp" target="_blank">
💬
</a>
  
<script>

function abrirMenu(){

let menu = document.getElementById("menuOpcoes");

if(menu.style.right === "0px"){
menu.style.right = "-250px";
}else{
menu.style.right = "0px";
}

}

const titulos = document.querySelectorAll(".titulo");
const itens = document.querySelectorAll(".item");

titulos.forEach(titulo => {
  titulo.addEventListener("click", function(e){
    e.stopPropagation();

    let item = this.parentElement;
    let jaAberto = item.classList.contains("ativo");

    // fecha todos
    itens.forEach(i => i.classList.remove("ativo"));

    // abre só se não estava aberto
    if(!jaAberto){
      item.classList.add("ativo");
    }
  });
});

  
  let menuOpcoes = document.getElementById("menuOpcoes");
menuOpcoes.addEventListener("click", function(e){
  e.stopPropagation();
});
// clicar fora fecha tudo
document.addEventListener("click", function(e){
  let menu = document.getElementById("menuOpcoes");

  if(!menu.contains(e.target)){
    itens.forEach(i => i.classList.remove("ativo"));
    menu.style.right = "-250px";
  }
});
  
</script>

</body>
</html>
