<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Empresa de Impressão 3D</title>

<style>

body{
font-family: Arial, sans-serif;
margin:0;
background:#000;
color:#d4af37;
overflow-x:hidden;
}

.topo-logo{
  width:100%;
  height:180px;
  background:#000;
  display:flex;
  justify-content:center;
  align-items:center;
}

.topo-logo img{
  max-height:150px;
  max-width:95%;
  object-fit:contain;
} 
.menu{
  position:fixed;
  top:20px;
  right:20px;
  font-size:32px;
  cursor:pointer;
  color:#d4af37;
  z-index:20000;
}

.opcoes{
  position:fixed;
  top:0;
  right:0;
  width:250px;
  height:100%;
  background:#111;
  color:#d4af37;
  transition: transform 0.3s ease;
  transform: translateX(100%);
  z-index:9999;
  padding-top:60px;
}

.opcoes.aberto{
  transform: translateX(0);
}
  /*bANNER INICIAL*/
  .banner{
width:95%;
mergin:20px auto;
height:420px;
position:relative;
overflow:hidden;
margin-top:10px;
border-radius:20px;
}

.slides{
width:100%;
height:100%;
position:relative;
}

.slide{
position:absolute;
width:100%;
height:100%;
object-fit:cover;
opacity:0;
transition:opacity 1s ease;
filter:brightness(0.75);
}

.slide.active{
opacity:1;
}

.pontos{
position:absolute;
bottom:15px;
width:100%;
text-align:center;
z-index:10;
}

.pontos span.ativo{
opacity:1;
transform:scale(1.2);
}

.pontos{
position:absolute;
bottom:15px;
width:100%;
text-align:center;
}

.pontos span{
display:inline-block;
width:12px;
height:12px;
background:white;
border-radius:50%;
margin:5px;
opacity:0.5;
transition:0.3s;
}
  
  .whatsapp{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
color:white;
font-size:28px;
width:60px;
height:60px;
display:flex;
align-items:center;
justify-content:center;
border-radius:50%;
text-decoration:none;
box-shadow:0 4px 10px rgba(0,0,0,0.3);
}

  
.item{
border-bottom:1px solid #444;
}

.titulo{
padding:20px;
cursor:pointer;
font-size:18px;
}

.conteudo{
max-height:0;
overflow:hidden;
transition:max-height 0.4s ease;
background:#333;
padding:0 20px;
font-size:15px;
}

.item.ativo .conteudo{
max-height:200px;
padding:15px 20px;
}
</style>

</head>

<body>

<div class="topo-logo">
  <img src="logo.png" alt="Logo da Empresa">
</div>

<div class="menu">☰</div>


  <div class="banner">

  <div class="slides">

    <img src="foto1.png" class="slide active">
    <img src="foto2.png" class="slide">
    <img src="foto3.png" class="slide">

  </div>

  <div class="pontos">
    <span class="ativo"></span>
    <span></span>
    <span></span>
  </div>

</div>
  <!--FIM DO BANER-->
  
 <div id="menuOpcoes" class="opcoes">

  <div class="item">
    <div class="titulo">Sobre</div>
    <div class="conteudo">
      <p>Aqui vai a história da empresa e o que ela faz com impressão 3D.</p>
    </div>
  </div>

  <div class="item">
    <div class="titulo">Portfólio</div>
    <div class="conteudo">
      <p>Aqui você pode colocar fotos dos trabalhos feitos.</p>
    </div>
  </div>

  <div class="item">
    <div class="titulo">Manutenção</div>
    <div class="conteudo">
      <p>Informações sobre manutenção de impressoras 3D.</p>
    </div>
  </div>

  <div class="item">
    <div class="titulo">Contato</div>
    <div class="conteudo">
      <p>WhatsApp: coloque o número aqui</p>
    </div>
  </div>

</div>

<a href="https://wa.me/5511999999999" class="whatsapp" target="_blank">
💬
</a>
  
<script>
document.addEventListener("DOMContentLoaded", function(){

function abrirMenu(){
  document.getElementById("menuOpcoes").classList.toggle("aberto");
}
  // deixa a função global pro onclick funcionar
  window.abrirMenu = abrirMenu;

  const titulos = document.querySelectorAll(".titulo");
  const itens = document.querySelectorAll(".item");
  const menu = document.getElementById("menuOpcoes");
 
 document.querySelector(".menu").addEventListener("click", function(e){
  e.stopPropagation();
  menu.classList.add("aberto"); 
});

  titulos.forEach(titulo => {
    titulo.addEventListener("click", function(e){
      e.stopPropagation();

      let item = this.parentElement;
      let jaAberto = item.classList.contains("ativo");

      itens.forEach(i => i.classList.remove("ativo"));

      if(!jaAberto){
        item.classList.add("ativo");
      }
    });
  });

  menu.addEventListener("click", function(e){
    e.stopPropagation();
  });

 document.addEventListener("click", function(e){
  if(!menu.contains(e.target) && !e.target.classList.contains("menu")){
    itens.forEach(i => i.classList.remove("ativo"));
    menu.classList.remove("aberto");
  }
});
  /*SLIDER */
  
const slides = document.querySelectorAll(".slide");
const pontos = document.querySelectorAll(".pontos span");

let index = 0;

function trocarSlide(){

  slides.forEach(slide => {
    slide.classList.remove("active");
  });

  pontos.forEach(ponto => {
    ponto.classList.remove("ativo");
  });

  index++;

  if(index >= slides.length){
    index = 0;
  }

  slides[index].classList.add("active");
  pontos[index].classList.add("ativo");
}

setInterval(trocarSlide, 3000);
});

  
</script>

</body>
</html>
