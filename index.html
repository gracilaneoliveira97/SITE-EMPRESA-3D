<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Empresa de Impressão 3D</title>

<style>

body{
font-family: Arial, sans-serif;
margin:0;
background:#f4f4f4;
}

header{
background:#111;
color:white;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

.logo{
font-size:20px;
font-weight:bold;
}

.menu{
font-size:28px;
cursor:pointer;
}

.opcoes{
display:none;
background:#222;
color:white;
}

.opcoes div{
padding:15px;
border-bottom:1px solid #444;
cursor:pointer;
}

.opcoes div:hover{
background:#333;
}

.secao{
display:none;
padding:30px;
background:white;
margin:20px;
border-radius:8px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}
  /*bANNER INICIAL*/
  .banner{
width:100%;
height:350px;
background-image:url("https://via.placeholder.com/1200x350");
background-size:cover;
background-position:center;
position:relative;
}

.pontos{
position:absolute;
bottom:15px;
width:100%;
text-align:center;
}

.pontos span{
display:inline-block;
width:10px;
height:10px;
background:white;
border-radius:50%;
margin:5px;
opacity:0.7;
}
  
  .whatsapp{
position:fixed;
bottom:20px;
right:20px;
background:#25D366;
color:white;
font-size:28px;
width:60px;
height:60px;
display:flex;
align-items:center;
justify-content:center;
border-radius:50%;
text-decoration:none;
box-shadow:0 4px 10px rgba(0,0,0,0.3);
}

</style>

</head>

<body>

<header>

<div class="logo">Empresa 3D</div>

<div class="menu" onclick="abrirMenu()">☰</div>

</header>

  <div class="banner">
  <div class="pontos">
  <span></span>
  <span></span>
  <span></span>
  </div>

  </div>
  <!--FIM DO BANER-->
  
  <div id="menuOpcoes" class="opcoes">

<div onclick="toggle('sobre')">Sobre</div>
<div onclick="toggle('portfolio')">Portfólio</div>
<div onclick="toggle('manutencao')">Manutenção</div>
<div onclick="toggle('contato')">Contato</div>

</div>

<div id="sobre" class="secao">
<h2>Sobre a empresa</h2>
<p>Aqui vai a história da empresa e o que ela faz com impressão 3D.</p>
</div>

<div id="portfolio" class="secao">
<h2>Portfólio</h2>
<p>Aqui você pode colocar fotos dos trabalhos feitos.</p>
</div>

<div id="manutencao" class="secao">
<h2>Manutenção</h2>
<p>Informações sobre manutenção de impressoras 3D.</p>
</div>

<div id="contato" class="secao">
<h2>Contato</h2>
<p>WhatsApp: coloque o número aqui</p>
</div>
<a href="https://wa.me/5511999999999" class="whatsapp" target="_blank">
💬
</a>
  
<script>

function abrirMenu(){

let menu = document.getElementById("menuOpcoes");

if(menu.style.display === "block"){
menu.style.display = "none";
}else{
menu.style.display = "block";
}

}

function toggle(secao){

let elemento = document.getElementById(secao);

if(elemento.style.display === "block"){
elemento.style.display = "none";
}else{
elemento.style.display = "block";
}

}
 
</script>

</body>
</html>
